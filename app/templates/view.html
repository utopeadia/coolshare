<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>CoolShare ViewCode</title>
		<link
			rel="stylesheet"
			href="{{ url_for('static', filename='style.css') }}"
		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/default.min.css"
		/>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
	</head>
	<body>
		<div class="container">
			<h1>CoolShare - View Code</h1>
			<div class="code-container">
				<pre><code id="view-code">{{ code | safe }}</code></pre>
			</div>
			<div class="button-group">
				<button id="copy-button">复制代码</button>
				<button id="destroy-button">立即销毁</button>
			</div>
			<div id="countdown"></div>
		</div>

		<script>
			document.addEventListener('DOMContentLoaded', (event) => {
				const codeContainer = document.getElementById('view-code');
				const code = codeContainer.textContent; // 获取原始代码文本
				codeContainer.textContent = code; // 使用textContent直接设置，不进行HTML解析
				hljs.highlightElement(codeContainer); // 使用highlight.js进行代码高亮

				const copyButton = document.getElementById('copy-button');
				const destroyButton = document.getElementById('destroy-button');
				const countdownDiv = document.getElementById('countdown');

				copyButton.addEventListener('click', () => {
					const code = document.getElementById('view-code').textContent;
					navigator.clipboard.writeText(code).then(
						() => {
							alert('代码已复制到剪贴板');
						},
						(err) => {
							console.error('无法复制代码: ', err);
						}
					);
				});

				destroyButton.addEventListener("click", async () => {
					const shareCode = window.location.pathname.split("/").pop();
					try {
						const response = await fetch("/destroy", {
							method: "POST",
							headers: {
								"Content-Type": "application/json",
							},
							body: JSON.stringify({ share_code: shareCode }),
						});

						if (response.ok) {
							alert("代码片段已销毁");
							window.location.href = "/";
						} else {
							const data = await response.json();
							alert(`销毁失败: ${data.error}`);
						}
					} catch (error) {
						console.error("Error:", error);
						alert("销毁失败，请稍后再试");
					}
				});

				const expirationTimeStr = "{{ expiration_time }}";
				const expirationTime = new Date(Number(expirationTimeStr));

				function updateCountdown() {
					const now = new Date().getTime();
					const timeLeft = expirationTime - now;

					if (timeLeft > 0) {
						const hours = Math.floor(
							(timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
						);
						const minutes = Math.floor(
							(timeLeft % (1000 * 60 * 60)) / (1000 * 60)
						);
						const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

						countdownDiv.textContent = `代码将在 ${hours}小时 ${minutes}分钟 ${seconds}秒 后过期`;
					} else {
						countdownDiv.textContent = "代码已过期";
						destroyButton.disabled = true;
					}
				}

				updateCountdown();
				setInterval(updateCountdown, 1000);
			});
		</script>
	</body>
</html>
