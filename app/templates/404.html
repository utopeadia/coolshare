<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源不可用</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background-color: #fff;
            padding: 60px 80px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .error-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background-color: #f8d7da;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-icon i {
            font-size: 60px;
            color: #dc3545;
        }

        h1 {
            color: #343a40;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.4em;
            margin-bottom: 30px;
            color: #6c757d;
        }

        a {
            display: inline-block;
            padding: 12px 24px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #0062cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">
            <i class="fas fa-exclamation-circle"></i> 
        </div>
        <h1>资源不可用</h1>
        <p>抱歉，您查找的内容已过期或被销毁。</p>
        <a href="/">返回首页</a>
    </div>
    <script src="https://kit.fontawesome.com/e8a1f77f28.js"" crossorigin="anonymous"></script> 
</body>
</html>
