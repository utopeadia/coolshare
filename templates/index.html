<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码片段分享</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>代码片段分享</h1>
        <textarea id="code-input" placeholder="请输入代码片段" spellcheck="false"></textarea>

        <div class="options">
            <div class="option">
                <label for="custom-code">自定义分享码 (可选):</label>
                <input type="text" id="custom-code" placeholder="8位字母或数字" maxlength="6">
            </div>
            <div class="option">
                <label for="time-select">分享时间:</label>
                <select id="time-select">
                    <option value="5">5 分钟</option>
                    <option value="10">10 分钟</option>
                    <option value="30">30 分钟</option>
                    <option value="custom">自定义 (分钟)</option>
                </select>
                <input type="number" id="custom-time" placeholder="自定义时间 (分钟)" min="1" max="28800" style="display: none;">
            </div>
        </div>

        <button id="share-button">分享</button>

        <div id="result" class="hidden">
            <h2>分享成功！</h2>
            <p>您的分享链接: <span id="share-link"></span></p>
            <p>此代码片段将在 <span id="countdown"></span> 后过期。</p>
            <button id="copy-button">复制链接</button>
            <button id="destroy-button">立即销毁</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
